[[exceptions]]
type = "dpkg"
name = "bash"
version = "5.2.15-2+b10"
spdx = "GPL-3.0-or-later"
reason = """Redistributed from python:3.13-slim-bookworm@sha256:061b6e52a07ab675f0e4a9428c5a8ee6bed996983427f4691f6bebf29c56d9dc
as the runtime entrypoint shell. GPL-3.0-or-later is consistent with Debian's
distribution of the package. Source available at https://ftp.gnu.org/gnu/bash/.
Update this version pin when the base image digest is updated."""
